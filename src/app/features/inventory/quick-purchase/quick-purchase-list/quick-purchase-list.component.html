<div class="list-header animate-fade-in">
  <div class="title-section">
    <h1 class="page-title">Quick Purchase Dashboard</h1>
    <p class="subtitle">Direct material acquisition and real-time ledger updates</p>
  </div>
  <div class="action-buttons">
    <button mat-raised-button class="btn-pill" (click)="router.navigate(['/app/quick-inventory/grn-list'])">
       <mat-icon>receipt_long</mat-icon> Quick GRN List
    </button>
  </div>
</div>

<!-- 📊 SUMMARY STATS -->
<app-summary-stats [stats]="summaryStats" [isLoading]="isDashboardLoading"></app-summary-stats>

<div class="list-container" [class.disabled-content]="isDashboardLoading">
  <div class="page-container">

    <div class="loading-shade" *ngIf="isLoading && !isDashboardLoading">
      <mat-spinner strokeWidth="3" diameter="50"></mat-spinner>
    </div>

    <app-enterprise-hierarchical-grid
      [addNewLabel]="'New Purchase'"
      [addNewRoute]="'/app/quick-inventory/purchase/add'"
      [entityName]="'Purchase'"
      [columns]="poColumns"
      [childColumns]="itemColumns"
      [dataSource]="dataSource"
      [totalRecords]="totalRecords"
      [pageSize]="pageSize"
      [isLoading]="isLoading"
      [childDataField]="'items'"
      [userRole]="userRole"
      [highlightedId]="highlightedPoId"
      [canAdd]="canAdd"
      [canEdit]="canEdit"
      [canDelete]="canDelete"
      (onGridStateChange)="onGridStateChange($event)"
      (deleteRecord)="onDeleteSingleRecord($event)"
      (bulkDeleteChildItems)="onBulkDeleteChildItems($event)"
      (selectionChanged)="onGridSelectionChange($event)"
      (bulkDeleteParentOrders)="onBulkDeleteParentOrders($event)"
      (bulkApproveOrders)="onBulkApproveOrders($event)"
      (bulkDraftApproved)="onBulkDraftApprovedGrid($event)"
      (bulkPORejected)="onBulkPORejectedGrid($event)"
      (bulkCreateGrn)="onBulkCreateGrnGrid($event)"
      (actionClicked)="handleGridAction($event)">
    </app-enterprise-hierarchical-grid>

  </div>
</div>
