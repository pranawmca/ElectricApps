<div class="list-header animate-fade-in">
  <div class="title-section">
    <h1 class="page-title">Quick Sale Dashboard</h1>
    <p class="subtitle">Direct retail sales and real-time inventory deduction</p>
  </div>
  <div class="action-buttons">
    <button mat-raised-button color="primary" class="btn-pill success-btn" 
            (click)="bulkCollectPayment()" 
            [disabled]="isLoading"
            *ngIf="canShowBulkPayment">
      <mat-icon>payments</mat-icon>
      Bulk Collect Payment
    </button>
  </div>
</div>

<!-- 📊 SUMMARY STATS -->
<app-summary-stats [stats]="summaryStats" [isLoading]="isDashboardLoading"></app-summary-stats>

<div class="list-container" [class.disabled-content]="isDashboardLoading">
  <div class="page-container">

    <div class="loading-shade" *ngIf="isLoading && !isDashboardLoading">
      <mat-spinner strokeWidth="3" diameter="50"></mat-spinner>
    </div>

    <app-enterprise-hierarchical-grid
      [addNewLabel]="'New Sale'"
      [addNewRoute]="'/app/quick-inventory/sale/add'"
      [disableAdd]="isAllBranchesView"
      [addDisabledTooltip]="addNewTooltip"
      [entityName]="'Sale'"
      [showApprovalWorkflow]="false"
      [columns]="soColumns"
      [childColumns]="itemColumns"
      [dataSource]="dataSource"
      [totalRecords]="totalRecords"
      [pageSize]="pageSize"
      [isLoading]="isLoading"
      [childDataField]="'items'"
      [userRole]="userRole"
      [highlightedId]="highlightedSoId"
      [canAdd]="canAdd"
      [canEdit]="canEdit"
      [canDelete]="canDelete"
      [showSimpleActions]="true"
      [showBulkConfirm]="true"
      (onGridStateChange)="onGridStateChange($event)"
      (deleteRecord)="onDeleteSingleRecord($event)"
      (selectionChanged)="onGridSelectionChange($event)"
      (actionClicked)="handleGridAction($event)"
      (bulkDeleteParentOrders)="onBulkDeleteGrid($event)"
      (bulkConfirmOrders)="onBulkConfirmGrid($event)">
    </app-enterprise-hierarchical-grid>

  </div>
</div>
