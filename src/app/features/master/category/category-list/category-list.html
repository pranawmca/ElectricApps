<div class="container-fluid" [class.disabled-content]="isDashboardLoading">
  
  <div class="header-actions">
    <h1 class="page-title m-0">All Categories</h1>
    <div class="d-flex gap-3">
      <!-- Hidden file input -->
      <input type="file" #fileInput (change)="onFileSelected($event)" accept=".xlsx, .xls" style="display: none;">
      
      <!-- Download Template -->
      <button mat-raised-button class="template-btn pill-btn" (click)="downloadTemplate()" [disabled]="loading">
        <mat-icon>download</mat-icon> TEMPLATE
      </button>

      <!-- Bulk Upload -->
      <button mat-raised-button class="bulk-upload-btn pill-btn" (click)="fileInput.click()" [disabled]="loading">
        <mat-icon>upload_file</mat-icon> BULK UPLOAD
      </button>

      <!-- Bulk Delete -->
      <ng-container *appPermission="'BULK_DELETE'">
        <button *ngIf="canDelete && selectedRows.length > 0" mat-raised-button color="warn" class="delete-action-btn pill-btn" (click)="confirmBulkDelete()" [disabled]="loading">
          <mat-icon>delete_sweep</mat-icon>
          Delete ({{selectedRows.length}})
        </button>
      </ng-container>

      <!-- Add New -->
      <button mat-raised-button color="primary" class="pill-btn" *ngIf="canAdd" routerLink="/app/master/categories/add" [disabled]="loading">
        <mat-icon>add</mat-icon>
        New Category
      </button>
    </div>
  </div>

  <app-summary-stats [stats]="summaryStats" [isLoading]="isDashboardLoading"></app-summary-stats>

  <div class="list-container">
    <div class="grid-wrapper">
      <app-server-datagrid
        gridKey="category-grid"
        [columns]="columns"
        [data]="data"
        [totalCount]="totalCount"
        [loading]="loading && !isDashboardLoading"
        (loadData)="loadCategories($event)"
        (selectionChange)="onSelectionChange($event)"
        (editAction)="onEdit($event)"
        (delete)="deleteCategory($event[0])">
      </app-server-datagrid>
    </div>
  </div>
</div>
