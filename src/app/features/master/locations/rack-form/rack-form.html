<div class="form-container">
    <div class="form-header">
      <button mat-icon-button routerLink="/app/master/racks">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <h1 class="page-title">{{ isEditMode ? 'Edit' : 'Add New' }} Rack</h1>
    </div>

    <app-summary-stats [stats]="summaryStats" [isLoading]="isLoading"></app-summary-stats>
  
    <mat-card class="form-card">
      <form [formGroup]="rackForm" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Select Warehouse</mat-label>
            <mat-select formControlName="warehouseId">
              <div class="select-search-container">
                <mat-form-field appearance="fill" class="select-search-field">
                  <input matInput #searchWarehouseInput placeholder="Search Warehouse..." 
                         (input)="warehouseSearchTerm = $any($event.target).value"
                         (keydown)="$event.stopPropagation()">
                  <mat-icon matPrefix>search</mat-icon>
                  <button *ngIf="warehouseSearchTerm" matSuffix mat-icon-button 
                          (click)="warehouseSearchTerm = ''; searchWarehouseInput.value = ''; $event.stopPropagation()">
                    <mat-icon>close</mat-icon>
                  </button>
                </mat-form-field>
              </div>
              <mat-option *ngFor="let w of filteredWarehouses" [value]="w.id">
                {{ w.name }}
              </mat-option>
              <mat-option *ngIf="filteredWarehouses.length === 0" disabled>No warehouse found</mat-option>
            </mat-select>
            <mat-error *ngIf="rackForm.get('warehouseId')?.hasError('required')">
              Warehouse selection is required
            </mat-error>
          </mat-form-field>
  
          <mat-form-field appearance="outline">
            <mat-label>Rack Name</mat-label>
            <input matInput formControlName="name" placeholder="Enter rack name (e.g. Rack A1, Shelf 2)">
            <mat-error *ngIf="rackForm.get('name')?.hasError('required')">
              Rack name is required
            </mat-error>
          </mat-form-field>
  
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" placeholder="Short description about the rack location" rows="3"></textarea>
          </mat-form-field>
  
          <div class="status-toggle full-width">
            <mat-slide-toggle formControlName="isActive" color="primary">
              Active Status
            </mat-slide-toggle>
          </div>
        </div>
  
        <div class="form-actions">
          <button mat-raised-button type="button" class="pill-btn cancel-btn" routerLink="/app/master/racks">CANCEL</button>
          <button mat-raised-button color="primary" class="pill-btn submit-btn" type="submit" [disabled]="rackForm.invalid || isLoading">
            <mat-icon>save</mat-icon> {{ isEditMode ? 'UPDATE' : 'SAVE' }} RACK
          </button>
        </div>
      </form>
    </mat-card>
  </div>
