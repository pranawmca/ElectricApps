<div class="rack-list-container">
    <div class="list-header">
      <h1 class="page-title">Rack Management</h1>
      <div class="header-actions" style="display: flex !important; gap: 15px !important; align-items: center !important;">
        <!-- Hidden file input -->
        <input type="file" #fileInput (change)="onFileSelected($event)" accept=".xlsx, .xls" style="display: none;">
        
        <!-- Download Template -->
        <button mat-raised-button class="template-btn pill-btn" (click)="downloadTemplate()" [disabled]="isLoading">
          <mat-icon>download</mat-icon> TEMPLATE
        </button>

        <!-- Bulk Upload Button -->
        <button mat-raised-button class="bulk-upload-btn pill-btn" (click)="fileInput.click()">
          <mat-icon>upload_file</mat-icon> BULK UPLOAD
        </button>

        <!-- Add New Button -->
        <button mat-raised-button color="primary" class="add-btn pill-btn" *ngIf="canAdd" routerLink="/app/master/racks/add">
          <mat-icon>add</mat-icon> ADD NEW RACK
        </button>
      </div>
    </div>
  
    <app-summary-stats [stats]="summaryStats" [isLoading]="isLoading"></app-summary-stats>
  
    <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 8px;">
      <mat-label>Search Racks...</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Search anything...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  
    <mat-card class="list-card">
      <div class="table-container">
        <table mat-table [dataSource]="dataSource" matSort class="w-100">
  
          <ng-container matColumnDef="index">
            <th mat-header-cell *matHeaderCellDef> # </th>
            <td mat-cell *matCellDef="let row; let i = index;"> {{i + 1}} </td>
          </ng-container>
  
          <ng-container matColumnDef="branch">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Branch </th>
            <td mat-cell *matCellDef="let element"> {{element.branchName || 'Main Branch'}} </td>
          </ng-container>

          <ng-container matColumnDef="warehouse">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Warehouse </th>
            <td mat-cell *matCellDef="let element"> {{element.warehouseName}} </td>
          </ng-container>
  
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Rack Name </th>
            <td mat-cell *matCellDef="let element"> <strong>{{element.name}}</strong> </td>
          </ng-container>
  
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef> Description </th>
            <td mat-cell *matCellDef="let element"> {{element.description}} </td>
          </ng-container>
  
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Status </th>
            <td mat-cell *matCellDef="let element">
              <span [ngClass]="element.isActive ? 'badge-success' : 'badge-danger'">
                {{element.isActive ? 'Active' : 'Inactive'}}
              </span>
            </td>
          </ng-container>
  
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Action </th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button color="primary" *ngIf="canEdit" (click)="editRack(element)" matTooltip="Edit Rack">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" *ngIf="canDelete" (click)="deleteRack(element)" matTooltip="Delete Rack">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>
  
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
  
        <mat-paginator [pageSizeOptions]="[10, 25, 50]" aria-label="Select page"></mat-paginator>
      </div>
    </mat-card>
  </div>
