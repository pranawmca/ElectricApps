<div class="dialog-container">
    <div class="dialog-header">
        <h2 mat-dialog-title>Onboard New Customer</h2>
        <button mat-icon-button (click)="close()" class="close-btn">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-dialog-content>
            <div class="form-grid">
                <!-- Customer Email -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Customer Email</mat-label>
                    <input matInput formControlName="email" placeholder="example@customer.com">
                    <mat-icon matSuffix>email</mat-icon>
                    <mat-hint>Enter the email address of the registered user</mat-hint>
                </mat-form-field>

                <div class="row">
                    <!-- Plan Type -->
                    <mat-form-field appearance="outline">
                        <mat-label>Initial Plan</mat-label>
                        <mat-select formControlName="planType">
                            <mat-option value="Trial">Trial Access</mat-option>
                            <mat-option value="Premium">Direct Premium</mat-option>
                        </mat-select>
                        <mat-icon matSuffix>card_membership</mat-icon>
                    </mat-form-field>

                    <!-- Duration Value -->
                    <mat-form-field appearance="outline">
                        <mat-label>Duration Value</mat-label>
                        <input matInput type="number" formControlName="durationValue">
                        <mat-icon matSuffix>timer</mat-icon>
                    </mat-form-field>
                </div>

                <div class="row">
                    <!-- Duration Unit -->
                    <mat-form-field appearance="outline" class="full-width">
                        <mat-label>Unit</mat-label>
                        <mat-select formControlName="durationUnit">
                            <mat-option value="Days">Days</mat-option>
                            <mat-option value="Months">Months</mat-option>
                            <mat-option value="Years">Years</mat-option>
                        </mat-select>
                        <mat-icon matSuffix>event</mat-icon>
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>

        <mat-dialog-actions align="end">
            <button mat-button type="button" (click)="close()">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading" class="pill-btn">
                <mat-icon *ngIf="!loading">person_add</mat-icon>
                {{ loading ? 'Processing...' : 'Start Subscription' }}
            </button>
        </mat-dialog-actions>
    </form>
</div>
