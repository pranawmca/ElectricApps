<div class="page-container" [class.disabled-content]="loading">
  <div class="header-row">
    <div class="title-section flex-row flex-center gap-2">
      <mat-icon class="header-icon">business</mat-icon>
      <h2>Company Management</h2>
    </div>
    <div class="action-section">
      <button *ngIf="canDelete && selectedRows.length > 0" mat-raised-button class="delete-action-btn" (click)="confirmBulkDelete()" [disabled]="loading">
        <mat-icon>delete_sweep</mat-icon>
        Delete Selected ({{selectedRows.length}})
      </button>
      <button *appPermission="'BULK_ADD'" mat-raised-button 
        [routerLink]="router.url.includes('/admin/') ? '/app/admin/companies/bulk-add' : '/app/company/bulk-add'" 
        class="bulk-add-btn">
        <mat-icon>library_add</mat-icon>
        Bulk Add
      </button>
      <button *ngIf="canAdd && selectedRows.length === 0" mat-raised-button class="main-add-btn" 
        [routerLink]="router.url.includes('/admin/') ? '/app/admin/companies/add' : '/app/company/add'">
        <mat-icon>add</mat-icon>
        Add Company
      </button>
    </div>
  </div>

  <app-summary-stats [stats]="summaryStats" [isLoading]="loading"></app-summary-stats>

  <div class="grid-container">
    <app-server-datagrid 
      gridKey="company-grid"
      [columns]="columns" 
      [data]="data" 
      [totalCount]="totalCount" 
      [loading]="loading"
      (loadData)="loadCompanies($event)" 
      (selectionChange)="onSelectionChange($event)"
      (editAction)="onEdit($event)"
      (delete)="deleteCompany($event[0])">
    </app-server-datagrid>
  </div>
</div>
